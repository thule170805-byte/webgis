<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGIS với GeoJSON</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    var map = L.map('map').setView([21.0285, 105.8542], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    fetch('./data/svd.geojson')
      .then(function(response) {
        if (!response.ok) {
          throw new Error('Không đọc được file GeoJSON: ' + response.status);
        }
        return response.json();
      })
      .then(function(data) {
        var geojsonLayer = L.geoJSON(data, {
          style: function(feature) {
            return {
              color: 'blue',
              weight: 2,
              fillColor: 'cyan',
              fillOpacity: 0.4
            };
          },
          onEachFeature: function(feature, layer) {
            if (feature.properties) {
              var popupContent = '';
              for (var key in feature.properties) {
                popupContent += '<b>' + key + ':</b> ' + feature.properties[key] + '<br>';
              }
              layer.bindPopup(popupContent);
            }
          }
        }).addTo(map);

        if (geojsonLayer.getBounds().isValid()) {
          map.fitBounds(geojsonLayer.getBounds());
        }
      })
      .catch(function(error) {
        console.error('Lỗi:', error);
        alert('Không tải được lớp GeoJSON. Kiểm tra tên file, thư mục data, và đường dẫn.');
      });
  </script>
</body>
</html>
